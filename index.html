<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Efisiensi Anggaran WFH | Presisi & Akurat</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px 28px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            background: linear-gradient(135deg, #ffffff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            margin-bottom: 28px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.1);
        }

        .card-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.3px;
            margin-bottom: 6px;
        }

        .card-value {
            font-size: 24px;
            font-weight: 800;
            color: white;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .card-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 600;
        }

        .badge-blue { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .badge-green { background: rgba(16, 185, 129, 0.2); color: #4ade80; }
        .badge-orange { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .badge-red { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        /* Tab Content */
        .tab-content {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.85);
            font-weight: 600;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.9);
        }

        .text-right {
            text-align: right;
        }

        .efisiensi-badge {
            background: rgba(16, 185, 129, 0.15);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #4ade80;
            display: inline-block;
        }

        /* Chart Container */
        .chart-container {
            position: relative;
            width: 100%;
            height: 420px;
        }

        /* Detail Grid - PRESISI */
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
        }

        .dept-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .dept-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.08);
        }

        .dept-header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dept-header h4 {
            color: white;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dept-header h4 i {
            color: #a78bfa;
            font-size: 20px;
        }

        .komponen-list {
            padding: 16px 20px;
        }

        .komponen-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.06);
        }

        .komponen-item:last-of-type {
            border-bottom: none;
        }

        .komponen-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 500;
            min-width: 130px;
        }

        .komponen-label i {
            width: 20px;
            font-size: 13px;
        }

        .komponen-nilai {
            text-align: right;
            min-width: 110px;
        }

        .nilai-awal {
            color: white;
            font-weight: 600;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }

        .hemat-detail {
            text-align: right;
            color: #4ade80;
            font-weight: 600;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        .total-section {
            background: rgba(0, 0, 0, 0.3);
            padding: 16px 20px;
            border-top: 1px solid rgba(102, 126, 234, 0.3);
        }

        .total-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .total-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 600;
        }

        .total-value {
            color: white;
            font-weight: 800;
            font-size: 15px;
            font-family: 'Courier New', monospace;
        }

        .hemat-value {
            color: #4ade80;
            font-weight: 700;
            font-size: 14px;
        }

        .realisasi-value {
            color: #fbbf24;
            font-weight: 800;
            font-size: 16px;
        }

        .efisiensi-value {
            color: #4ade80;
            font-weight: 600;
            font-size: 13px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 16px;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.35);
            font-size: 11px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 18px;
        }

        /* Monospace untuk angka */
        .mono {
            font-family: 'Courier New', 'Fira Code', monospace;
            letter-spacing: 0.3px;
        }

        @media (max-width: 900px) {
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
            .detail-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .summary-grid { grid-template-columns: 1fr; }
            body { padding: 12px; }
            .tab-btn { padding: 6px 14px; font-size: 11px; }
            .komponen-label { min-width: 100px; font-size: 11px; }
            .nilai-awal, .hemat-detail { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <i class="fas fa-chart-line"></i>
                Dashboard Efisiensi Anggaran WFH
            </h1>
            <p>
                <i class="fas fa-building"></i> Instansi Pemerintah
                <i class="fas fa-calendar-alt"></i> Periode WFH Integral (100%)
                <i class="fas fa-chart-simple"></i> Estimasi Penghematan Bulanan
            </p>
        </div>

        <!-- Summary Cards -->
        <div class="summary-grid" id="summaryCards"></div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="table">
                <i class="fas fa-table"></i> Tabel Anggaran
            </button>
            <button class="tab-btn" data-tab="chart">
                <i class="fas fa-chart-bar"></i> Grafik Perbandingan
            </button>
            <button class="tab-btn" data-tab="detail">
                <i class="fas fa-microchip"></i> Detail Komponen
            </button>
        </div>

        <!-- Tab Table -->
        <div id="table" class="tab-content active">
            <div class="table-wrapper">
                <table id="anggaranTable">
                    <thead>
                        <tr><th>Departemen</th><th class="text-right">Anggaran Awal</th><th class="text-right">Penghematan</th><th class="text-right">Realisasi</th><th class="text-right">Efisiensi</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Tab Chart -->
        <div id="chart" class="tab-content">
            <div class="chart-container">
                <canvas id="efisiensiChart"></canvas>
            </div>
        </div>

        <!-- Tab Detail -->
        <div id="detail" class="tab-content">
            <div id="detailContainer" class="detail-grid"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <i class="fas fa-lightbulb"></i> Estimasi efisiensi WFH integral: 
            Listrik (70%) | Air (80%) | Kebersihan (90%) | Snack/Kopi (95%) | Transport Lokal (85%) | ATK (75%)
        </div>
    </div>

    <script>
        (function() {
            // ==================== DATA PRESISI ====================
            const departemenData = [
                { nama: "Dinas Pendidikan", listrik: 12_000_000, air: 2_500_000, kebersihan: 3_000_000, snack: 1_500_000, transport: 4_000_000, atk: 2_000_000 },
                { nama: "Dinas Kesehatan", listrik: 18_000_000, air: 3_000_000, kebersihan: 4_500_000, snack: 2_000_000, transport: 5_000_000, atk: 2_500_000 },
                { nama: "Dinas PUPR", listrik: 15_000_000, air: 2_800_000, kebersihan: 3_500_000, snack: 1_800_000, transport: 4_500_000, atk: 2_200_000 },
                { nama: "Kesekretariatan Daerah", listrik: 25_000_000, air: 5_000_000, kebersihan: 6_000_000, snack: 3_000_000, transport: 7_000_000, atk: 3_500_000 },
                { nama: "Dinas Sosial", listrik: 10_000_000, air: 2_000_000, kebersihan: 2_500_000, snack: 1_200_000, transport: 3_000_000, atk: 1_500_000 }
            ];

            // Persentase efisiensi presisi
            const efisiensi = {
                listrik: 0.70,   // 70%
                air: 0.80,       // 80%
                kebersihan: 0.90, // 90%
                snack: 0.95,     // 95%
                transport: 0.85, // 85%
                atk: 0.75        // 75%
            };

            // Helper Functions
            function totalAwal(d) {
                return d.listrik + d.air + d.kebersihan + d.snack + d.transport + d.atk;
            }

            function totalHemat(d) {
                return (d.listrik * efisiensi.listrik) + 
                       (d.air * efisiensi.air) + 
                       (d.kebersihan * efisiensi.kebersihan) + 
                       (d.snack * efisiensi.snack) + 
                       (d.transport * efisiensi.transport) + 
                       (d.atk * efisiensi.atk);
            }

            function realisasi(d) {
                return totalAwal(d) - totalHemat(d);
            }

            function formatRp(angka) {
                return new Intl.NumberFormat('id-ID', {
                    style: 'currency',
                    currency: 'IDR',
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 0
                }).format(angka);
            }

            // Format dengan separator titik untuk presisi
            function formatNumber(angka) {
                return new Intl.NumberFormat('id-ID').format(angka);
            }

            // ==================== RENDER SUMMARY ====================
            function renderSummary() {
                let totalAwalAll = 0, totalHematAll = 0;
                departemenData.forEach(d => {
                    totalAwalAll += totalAwal(d);
                    totalHematAll += totalHemat(d);
                });
                const totalRealisasi = totalAwalAll - totalHematAll;
                const persenEfisiensi = (totalHematAll / totalAwalAll) * 100;

                document.getElementById('summaryCards').innerHTML = `
                    <div class="card">
                        <div class="card-icon"><i class="fas fa-coins" style="color: #60a5fa"></i></div>
                        <div class="card-title">Total Anggaran Awal</div>
                        <div class="card-value mono">${formatRp(totalAwalAll)}</div>
                        <span class="card-badge badge-blue">Baseline Anggaran</span>
                    </div>
                    <div class="card">
                        <div class="card-icon"><i class="fas fa-sack-dollar" style="color: #4ade80"></i></div>
                        <div class="card-title">Total Penghematan</div>
                        <div class="card-value mono">${formatRp(totalHematAll)}</div>
                        <span class="card-badge badge-green">Efisiensi WFH</span>
                    </div>
                    <div class="card">
                        <div class="card-icon"><i class="fas fa-chart-simple" style="color: #fbbf24"></i></div>
                        <div class="card-title">Realisasi Anggaran</div>
                        <div class="card-value mono">${formatRp(totalRealisasi)}</div>
                        <span class="card-badge badge-orange">Setelah Efisiensi</span>
                    </div>
                    <div class="card">
                        <div class="card-icon"><i class="fas fa-gauge-high" style="color: #f87171"></i></div>
                        <div class="card-title">Persen Efisiensi</div>
                        <div class="card-value">${persenEfisiensi.toFixed(2)}%</div>
                        <span class="card-badge badge-red">Penghematan Signifikan</span>
                    </div>
                `;
            }

            // ==================== RENDER TABLE ====================
            function renderTable() {
                let html = '';
                departemenData.forEach(d => {
                    const awal = totalAwal(d);
                    const hemat = totalHemat(d);
                    const real = realisasi(d);
                    const persen = (hemat / awal) * 100;
                    html += `
                        <tr>
                            <td><i class="fas fa-building" style="color: #a78bfa; margin-right: 8px;"></i><strong>${d.nama}</strong></td>
                            <td class="text-right mono">${formatRp(awal)}</td>
                            <td class="text-right mono" style="color: #4ade80;">${formatRp(hemat)}</td>
                            <td class="text-right mono">${formatRp(real)}</td>
                            <td class="text-right"><span class="efisiensi-badge">${persen.toFixed(1)}%</span></td>
                        </tr>
                    `;
                });
                document.getElementById('tableBody').innerHTML = html;
            }

            // ==================== RENDER CHART ====================
            let chartInstance = null;

            function renderChart() {
                const canvas = document.getElementById('efisiensiChart');
                if (!canvas) return;

                if (chartInstance) {
                    chartInstance.destroy();
                    chartInstance = null;
                }

                const ctx = canvas.getContext('2d');
                const labels = departemenData.map(d => d.nama);
                const awalData = departemenData.map(d => totalAwal(d));
                const realData = departemenData.map(d => realisasi(d));

                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Anggaran Awal',
                                data: awalData,
                                backgroundColor: 'rgba(96, 165, 250, 0.8)',
                                borderColor: 'rgba(96, 165, 250, 1)',
                                borderWidth: 1,
                                borderRadius: 6,
                                barPercentage: 0.6,
                                categoryPercentage: 0.75
                            },
                            {
                                label: 'Realisasi (Setelah WFH)',
                                data: realData,
                                backgroundColor: 'rgba(74, 222, 128, 0.8)',
                                borderColor: 'rgba(74, 222, 128, 1)',
                                borderWidth: 1,
                                borderRadius: 6,
                                barPercentage: 0.6,
                                categoryPercentage: 0.75
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: {
                                    color: 'white',
                                    font: { size: 11, weight: 'bold' },
                                    usePointStyle: true,
                                    boxWidth: 10
                                }
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return context.dataset.label + ': ' + formatRp(context.raw);
                                    }
                                },
                                backgroundColor: 'rgba(0,0,0,0.85)',
                                titleColor: 'white',
                                bodyColor: '#ddd',
                                padding: 8,
                                cornerRadius: 8
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 50000000,
                                grid: { color: 'rgba(255, 255, 255, 0.08)' },
                                ticks: {
                                    color: 'white',
                                    stepSize: 10000000,
                                    callback: function(val) {
                                        return formatRp(val);
                                    },
                                    font: { size: 10 }
                                },
                                title: {
                                    display: true,
                                    text: 'Jumlah (Rupiah)',
                                    color: 'rgba(255,255,255,0.7)',
                                    font: { size: 11, weight: 'bold' }
                                }
                            },
                            x: {
                                grid: { display: false },
                                ticks: {
                                    color: 'white',
                                    font: { size: 10 },
                                    maxRotation: 45,
                                    minRotation: 45
                                },
                                title: {
                                    display: true,
                                    text: 'Departemen',
                                    color: 'rgba(255,255,255,0.7)',
                                    font: { size: 11, weight: 'bold' }
                                }
                            }
                        },
                        layout: {
                            padding: { top: 10, bottom: 10, left: 5, right: 5 }
                        }
                    }
                });
            }

            // ==================== RENDER DETAIL PRESISI ====================
            function renderDetail() {
                const komponenDetail = [
                    { key: 'listrik', label: 'Listrik', persen: 70, icon: 'fa-bolt', color: '#f59e0b' },
                    { key: 'air', label: 'Air', persen: 80, icon: 'fa-droplet', color: '#3b82f6' },
                    { key: 'kebersihan', label: 'Kebersihan', persen: 90, icon: 'fa-broom', color: '#10b981' },
                    { key: 'snack', label: 'Snack & Kopi', persen: 95, icon: 'fa-mug-hot', color: '#ec489a' },
                    { key: 'transport', label: 'Transport Lokal', persen: 85, icon: 'fa-bus', color: '#8b5cf6' },
                    { key: 'atk', label: 'ATK', persen: 75, icon: 'fa-pen-ruler', color: '#06b6d4' }
                ];

                let html = '';
                departemenData.forEach(dept => {
                    // Build komponen items
                    let komponenHtml = '';
                    komponenDetail.forEach(k => {
                        const nilai = dept[k.key];
                        const hematNilai = nilai * (k.persen / 100);
                        komponenHtml += `
                            <div class="komponen-item">
                                <div class="komponen-label">
                                    <i class="fas ${k.icon}" style="color: ${k.color}"></i>
                                    ${k.label}
                                </div>
                                <div class="komponen-nilai">
                                    <div class="nilai-awal mono">${formatRp(nilai)}</div>
                                </div>
                                <div class="hemat-detail mono">→ Hemat ${k.persen}%: ${formatRp(hematNilai)}</div>
                            </div>
                        `;
                    });

                    const awal = totalAwal(dept);
                    const hemat = totalHemat(dept);
                    const real = realisasi(dept);
                    const persenEf = (hemat / awal) * 100;

                    html += `
                        <div class="dept-card">
                            <div class="dept-header">
                                <h4>
                                    <i class="fas fa-landmark"></i>
                                    ${dept.nama}
                                </h4>
                            </div>
                            <div class="komponen-list">
                                ${komponenHtml}
                            </div>
                            <div class="total-section">
                                <div class="total-item">
                                    <span class="total-label">TOTAL ANGGARAN</span>
                                    <span class="total-value mono">${formatRp(awal)}</span>
                                    <span class="hemat-value mono">Hemat: ${formatRp(hemat)}</span>
                                </div>
                                <div class="total-item">
                                    <span class="total-label">REALISASI AKHIR</span>
                                    <span class="realisasi-value mono">${formatRp(real)}</span>
                                    <span class="efisiensi-value">Efisiensi ${persenEf.toFixed(1)}%</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('detailContainer').innerHTML = html;
            }

            // ==================== TAB & RESIZE ====================
            function initTabs() {
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const tabId = btn.getAttribute('data-tab');
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                        document.getElementById(tabId).classList.add('active');
                        
                        if (tabId === 'chart') {
                            setTimeout(() => { if (chartInstance) chartInstance.resize(); else renderChart(); }, 100);
                        }
                    });
                });
            }

            window.addEventListener('resize', () => {
                if (chartInstance) setTimeout(() => chartInstance.resize(), 100);
            });

            // ==================== INIT ====================
            function init() {
                renderSummary();
                renderTable();
                renderDetail();
                initTabs();
                setTimeout(() => renderChart(), 150);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
